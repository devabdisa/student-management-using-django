{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dil Fere School Portal | Log in</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            background-color: #0d6efd;
            color: #fff;
            padding: 2rem;
            text-align: center;
        }
        .login-body {
            padding: 2rem;
            background: #fff;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-graduation-cap fa-3x mb-3"></i>
            <h3 class="mb-0 fw-bold">Dil Fere School</h3>
            <p class="mb-0 text-white-50">Portal Login</p>
        </div>

        <div class="login-body">
            {% if messages %}
                <div class="col-12 mb-3">
                    {% for message in messages %}
                        {% if message.tags == 'error' %}
                            <div class="alert alert-danger text-center">
                                {{ message }}
                            </div>
                        {% endif %}
                    {% endfor %}
                </div>
            {% endif %}

            <form action="doLogin/" method="post">
                {% csrf_token %}

                <div class="input-group mb-3">
                    <span class="input-group-text bg-white"><i class="fas fa-envelope"></i></span>
                    <input required type="email" name="email" class="form-control" placeholder="Email Address">
                </div>

                <div class="input-group mb-4">
                    <span class="input-group-text bg-white"><i class="fas fa-lock"></i></span>
                    <input required type="password" name="password" class="form-control" placeholder="Password">
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label text-muted" for="remember">
                            Remember Me
                        </label>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'password_reset' %}" class="text-decoration-none">Forgot your password?</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
